# Shared DB integration test profile.
# This profile is intentionally opt-in and should be run only when IT_SHARED_DB_ENABLED=true.

# Keep JDBC persistence path explicit for now; JPA profile can be added in a follow-up.
app.persistence.enableJPA=false

# Avoid external cache dependency during integration tests.
app.cache.enabled=false

# Reduce noise in test output.
debug=false
logging.level.root=WARN

